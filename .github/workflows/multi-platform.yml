name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    name: Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          platform: windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Friends-Mod
          path: ${{ steps.build.outputs.build-output }}
